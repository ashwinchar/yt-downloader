<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e1e1e1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 28px;
            color: #ff4444;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #252525;
            color: #e1e1e1;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ff4444;
        }

        .field { margin-bottom: 20px; }

        .folder-picker {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .folder-picker input {
            flex: 1;
        }

        .folder-picker button {
            padding: 12px 16px;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: #e1e1e1;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .folder-picker button:hover { background: #444; }

        .folder-browser {
            display: none;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .folder-browser.open { display: block; }

        .folder-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-item:hover { background: #333; }
        .folder-item.parent { color: #ff4444; font-weight: 500; }
        .folder-item .icon { opacity: 0.6; }

        .btn-download {
            width: 100%;
            padding: 14px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-download:hover { background: #e03333; }
        .btn-download:disabled { background: #555; cursor: not-allowed; }

        .status {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .status.success { display: block; background: #1a3a1a; color: #4caf50; border: 1px solid #2a5a2a; }
        .status.error { display: block; background: #3a1a1a; color: #f44336; border: 1px solid #5a2a2a; }
        .status.loading { display: block; background: #1a1a3a; color: #64b5f6; border: 1px solid #2a2a5a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Downloader</h1>

        <div class="field">
            <label>YouTube URL</label>
            <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=...">
        </div>

        <div class="field">
            <label>Output Folder</label>
            <div class="folder-picker">
                <input type="text" id="folder" placeholder="Select a folder..." readonly>
                <button onclick="toggleBrowser()">Browse</button>
            </div>
        </div>

        <div class="folder-browser" id="browser"></div>

        <button class="btn-download" id="downloadBtn" onclick="startDownload()">Download</button>

        <div class="status" id="status"></div>
    </div>

    <script>
        const browserEl = document.getElementById('browser');
        const folderEl = document.getElementById('folder');
        const statusEl = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        function toggleBrowser() {
            if (browserEl.classList.contains('open')) {
                browserEl.classList.remove('open');
            } else {
                loadFolder();
            }
        }

        async function loadFolder(path) {
            const params = path ? `?path=${encodeURIComponent(path)}` : '';
            const res = await fetch(`/browse${params}`);
            const data = await res.json();

            if (data.error) {
                showStatus(data.error, 'error');
                return;
            }

            folderEl.value = data.current;
            let html = '';

            if (data.parent !== data.current) {
                html += `<div class="folder-item parent" onclick="loadFolder('${escapeHtml(data.parent)}')">
                    <span class="icon">..</span> Parent Directory
                </div>`;
            }

            for (const name of data.folders) {
                const full = data.current + '/' + name;
                html += `<div class="folder-item" onclick="loadFolder('${escapeHtml(full)}')">
                    <span class="icon">📁</span> ${escapeHtml(name)}
                </div>`;
            }

            if (data.folders.length === 0) {
                html += '<div class="folder-item" style="opacity:0.5">No subfolders</div>';
            }

            browserEl.innerHTML = html;
            browserEl.classList.add('open');
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function startDownload() {
            const url = document.getElementById('url').value.trim();
            const folder = folderEl.value.trim();

            if (!url) { showStatus('Please enter a YouTube URL.', 'error'); return; }
            if (!folder) { showStatus('Please select an output folder.', 'error'); return; }

            downloadBtn.disabled = true;
            downloadBtn.textContent = 'Downloading...';
            showStatus('Downloading video... This may take a moment.', 'loading');

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, folder })
                });
                const data = await res.json();

                if (data.success) {
                    showStatus('Download complete! Video saved to: ' + folder, 'success');
                } else {
                    showStatus('Error: ' + data.error, 'error');
                }
            } catch (e) {
                showStatus('Request failed: ' + e.message, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = 'Download';
            }
        }

        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + type;
        }
    </script>
</body>
</html>
